<div class="skill-item group mb-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 overflow-hidden transition-all">
    <button class="skill-toggle w-full px-4 py-3 flex items-center justify-between hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors text-left" data-skill-id="{item.skill_id}">
        <div class="flex items-center gap-2 flex-1">
            {item.icon_html}
            <span class="text-sm font-semibold font-mono text-zinc-900 dark:text-zinc-100">{item.name}</span>
            {item.duration_html}
        </div>
        <ion-icon name="chevron-down-outline" class="skill-toggle-icon text-zinc-500 dark:text-zinc-400 transition-transform"></ion-icon>
    </button>
    <div class="skill-content hidden px-4 pb-4 border-t border-zinc-200 dark:border-zinc-800 skill-rollout">
        <div class="text-xs font-mono text-zinc-600 dark:text-zinc-400 font-medium mb-4 pt-2">{item.level}</div>
        {item.details_html}
        {item.projects_html}
    </div>
</div>
