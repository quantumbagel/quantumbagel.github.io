<div id="skill-{item.skill_id}" class="skill-item group mb-3 rounded-none border border-zinc-300 dark:border-zinc-700 bg-transparent overflow-hidden transition-all">
    <div class="skill-toggle w-full px-4 py-3 flex items-center justify-between hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors text-left cursor-pointer" data-skill-id="{item.skill_id}">
        <div class="flex items-center gap-2 flex-1">
            {item.icon_html}
            <span class="text-sm font-semibold font-mono text-zinc-900 dark:text-zinc-100">{item.name}</span>
            <button class="skill-copy-link hidden group-hover:inline-flex items-center text-zinc-400 hover:text-accent dark:hover:text-accent transition-colors" data-skill-id="{item.skill_id}" title="Copy link to skill">
                <ion-icon name="link" class="text-sm"></ion-icon>
            </button>
            {item.duration_html}
        </div>
        <ion-icon name="chevron-down-outline" class="skill-toggle-icon text-zinc-500 dark:text-zinc-400 transition-transform"></ion-icon>
    </div>
    <div class="skill-content">
        <div class="overflow-hidden opacity-0 transition-opacity duration-300">
            <div class="px-4 pb-4 border-t border-zinc-300 dark:border-zinc-700">
                <div class="text-xs font-mono text-zinc-600 dark:text-zinc-400 font-medium mb-4 pt-2">{item.level}</div>
                {item.details_html}
                {item.projects_html}
            </div>
        </div>
    </div>
</div>
