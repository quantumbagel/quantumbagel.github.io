<div id="{item.modal_id}" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-lg">
        <div class="p-6">
            <div class="flex items-start justify-between mb-4">
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">{item.title}</h2>
                <button class="modal-close-btn text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100" data-modal-id="{item.modal_id}">✕</button>
            </div>
            {item.details_html}
            {item.gallery_html}
            {item.features_html}
            <div class="mt-6 flex gap-3">
                {item.link_button_html}
            </div>
        </div>
    </div>
</div>
